version: "3.9"

services:
  pipeline:
    build: .
    container_name: market_pipeline
    command: python run_pipeline.py --limit 50 --schedule
    environment:
      - MARKET_DATA_PROVIDER=${MARKET_DATA_PROVIDER:-mock}
      - ICICI_APP_KEY=${ICICI_APP_KEY:-}
      - ICICI_SECRET_KEY=${ICICI_SECRET_KEY:-}
      - ICICI_SESSION_TOKEN=${ICICI_SESSION_TOKEN:-}
      - DATABASE_URL=sqlite:///data/market_data.db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - market_data:/app/data
      - market_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "from src.storage.database import Database; Database('sqlite:///data/market_data.db').health_check()"]
      interval: 60s
      timeout: 10s
      retries: 3

  dashboard:
    build: .
    container_name: market_dashboard
    command: python run_dashboard.py --port 8501
    environment:
      - MARKET_DATA_PROVIDER=${MARKET_DATA_PROVIDER:-mock}
      - DATABASE_URL=sqlite:///data/market_data.db
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
    volumes:
      - market_data:/app/data
      - market_logs:/app/logs
    ports:
      - "8501:8501"
    depends_on:
      - pipeline
    restart: unless-stopped

volumes:
  market_data:
    driver: local
  market_logs:
    driver: local
